<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1400" font-family="system-ui, sans-serif">
  <!-- Original schematic rendition of Paldea, v2 — proportions recalibrated
       against the real region layout (reference: the in-game map's geography;
       no traced assets, hand-authored flat-color vector art). Corrections vs
       v1: the Glaseado snowfields span the whole north, the Great Crater is
       far larger and truly central with Mesagoza on its southern rim,
       Casseroya sits NW below the snow line, rivers radiate from the crater
       to the coasts. -->

  <!-- sea -->
  <rect width="1400" height="1400" fill="#5fc4c7"/>
  <path d="M110 220 q60 -40 120 0 t120 0" stroke="#8fdadc" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M1130 1240 q60 -40 120 0" stroke="#8fdadc" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M1200 180 q45 -30 90 0" stroke="#8fdadc" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M150 1120 q45 -30 90 0" stroke="#8fdadc" stroke-width="9" fill="none" stroke-linecap="round"/>

  <!-- landmass: fuller, lumpier Paldea -->
  <path fill="#8fd05f" stroke="#4fb7ba" stroke-width="14" d="
    M660 70
    C 790 55, 920 85, 1000 140
    C 1090 130, 1170 190, 1180 260
    C 1270 320, 1310 430, 1290 530
    C 1340 590, 1340 680, 1290 730
    C 1330 830, 1310 950, 1230 1030
    C 1250 1090, 1210 1150, 1150 1160
    C 1090 1250, 980 1310, 860 1310
    C 810 1350, 720 1360, 660 1330
    C 540 1360, 420 1330, 350 1260
    C 270 1250, 210 1190, 210 1120
    C 130 1050, 100 940, 130 850
    C 90 790, 90 690, 140 640
    C 120 520, 160 400, 250 320
    C 250 250, 310 190, 380 190
    C 450 110, 550 80, 660 70 Z"/>

  <!-- inner meadow tone -->
  <path fill="#a9dd76" d="
    M660 150
    C 780 138, 900 165, 975 215
    C 1055 210, 1120 260, 1130 320
    C 1205 375, 1235 465, 1215 550
    C 1255 605, 1255 675, 1215 715
    C 1250 805, 1230 905, 1160 975
    C 1175 1030, 1140 1080, 1090 1090
    C 1035 1170, 935 1220, 830 1220
    C 785 1255, 705 1265, 655 1240
    C 550 1265, 445 1240, 385 1180
    C 315 1170, 265 1120, 265 1060
    C 200 1000, 175 905, 205 830
    C 170 780, 170 700, 215 660
    C 200 550, 235 445, 315 375
    C 320 315, 370 265, 430 265
    C 490 190, 570 160, 660 150 Z"/>

  <!-- Glaseado snowfields: the whole north -->
  <path fill="#e9eef6" stroke="#c9d4e4" stroke-width="7" d="
    M430 260 C 520 175, 660 145, 790 165 C 920 150, 1050 205, 1110 290
    C 1160 355, 1160 420, 1110 460 C 1020 520, 870 540, 740 520
    C 610 545, 480 510, 420 440 C 380 380, 385 310, 430 260 Z"/>
  <g>
    <path fill="#ffffff" stroke="#c9d4e4" stroke-width="5" d="M640 430 L720 280 L800 430 Z"/>
    <path fill="#f4f7fb" d="M560 445 L625 330 L690 445 Z"/>
    <path fill="#f4f7fb" d="M760 445 L825 330 L890 445 Z"/>
  </g>
  <!-- Montenevera perch -->
  <circle cx="600" cy="480" r="14" fill="#c9b6d9"/>

  <!-- Casseroya Lake (NW, below the snow line) -->
  <path fill="#57b7e8" stroke="#3d9ecf" stroke-width="8" d="
    M340 300 C 400 250, 500 255, 545 310 C 580 360, 570 425, 520 460
    C 460 500, 370 495, 330 445 C 295 400, 300 340, 340 300 Z"/>
  <circle cx="430" cy="380" r="22" fill="#a9dd76"/>
  <circle cx="480" cy="330" r="12" fill="#a9dd76"/>

  <!-- Great Crater of Paldea: big, central -->
  <ellipse cx="740" cy="740" rx="185" ry="200" fill="#c9a76b" stroke="#a9884e" stroke-width="10"/>
  <ellipse cx="740" cy="740" rx="140" ry="152" fill="#6b5a86"/>
  <ellipse cx="740" cy="740" rx="88" ry="96" fill="#4a3a5e"/>
  <ellipse cx="740" cy="740" rx="32" ry="35" fill="#8f7bb5"/>
  <g stroke="#a9884e" stroke-width="8" stroke-linecap="round">
    <path d="M740 528 v-26 M740 952 v26 M543 740 h-26 M937 740 h26"/>
  </g>

  <!-- rivers radiating from the crater basin -->
  <g stroke="#57b7e8" stroke-width="13" fill="none" stroke-linecap="round">
    <path d="M905 810 C 1010 850, 1090 850, 1180 820"/>
    <path d="M740 945 C 730 1030, 700 1100, 660 1160"/>
    <path d="M565 800 C 470 830, 390 830, 310 800"/>
    <path d="M600 570 C 540 520, 500 480, 480 450"/>
  </g>

  <!-- Asado Desert (W) -->
  <path fill="#ecd489" stroke="#d9bd6d" stroke-width="6" d="
    M185 585 C 245 540, 350 540, 400 595 C 440 645, 435 720, 385 765
    C 325 815, 220 810, 180 755 C 145 705, 145 630, 185 585 Z"/>
  <g stroke="#d9bd6d" stroke-width="7" fill="none" stroke-linecap="round">
    <path d="M215 630 q22 -14 44 0 M310 610 q22 -14 44 0 M250 700 q22 -14 44 0 M330 730 q22 -14 44 0"/>
  </g>

  <!-- Tagtree Thicket (ENE) -->
  <g fill="#4f9e4f">
    <circle cx="1050" cy="570" r="36"/><circle cx="1100" cy="545" r="30"/>
    <circle cx="1135" cy="585" r="32"/><circle cx="1080" cy="605" r="30"/>
  </g>

  <!-- Mesagoza: on the crater's southern rim, star plaza -->
  <g>
    <path d="M615 965 h250 a16 16 0 0 1 16 16 v70 a16 16 0 0 1 -16 16 h-250 a16 16 0 0 1 -16 -16 v-70 a16 16 0 0 1 16 -16 Z" fill="#c8c2ba" stroke="#a89f93" stroke-width="6"/>
    <rect x="645" y="930" width="38" height="42" rx="7" fill="#b3ab9f"/>
    <rect x="705" y="918" width="46" height="54" rx="7" fill="#beb6a9"/>
    <rect x="790" y="934" width="38" height="38" rx="7" fill="#b3ab9f"/>
    <path d="M740 995 l10 22 24 3 -17 17 4 24 -21 -11 -21 11 4 -24 -17 -17 24 -3 Z" fill="#e8b13f" stroke="#c98f2a" stroke-width="3"/>
  </g>

  <!-- Levincia (E coast) -->
  <g>
    <rect x="1180" y="700" width="96" height="62" rx="10" fill="#c8c2ba" stroke="#a89f93" stroke-width="5"/>
    <rect x="1200" y="670" width="28" height="36" rx="5" fill="#8fd0e8"/>
    <rect x="1240" y="660" width="24" height="46" rx="5" fill="#b3ab9f"/>
  </g>

  <!-- Porto Marinada + Cascarrafa (W coast) -->
  <g>
    <rect x="185" y="470" width="70" height="42" rx="8" fill="#d9a06b" stroke="#b9834f" stroke-width="4"/>
    <path d="M178 524 q32 18 84 6" stroke="#3d9ecf" stroke-width="6" fill="none"/>
    <rect x="300" y="500" width="52" height="36" rx="7" fill="#c8c2ba" stroke="#a89f93" stroke-width="4"/>
  </g>

  <!-- Artazon (SE) -->
  <g>
    <rect x="1050" y="960" width="64" height="42" rx="8" fill="#c8c2ba" stroke="#a89f93" stroke-width="4"/>
    <circle cx="1082" cy="950" r="12" fill="#6fbf5a"/>
  </g>

  <!-- south beaches -->
  <path fill="#eede9d" d="M420 1270 C 520 1320, 680 1340, 800 1320 C 720 1350, 560 1350, 440 1300 Z"/>

  <!-- scattered trees / hills -->
  <g fill="#6fbf5a">
    <circle cx="520" cy="1090" r="18"/><circle cx="560" cy="1115" r="14"/>
    <circle cx="960" cy="1090" r="18"/><circle cx="995" cy="1065" r="14"/>
    <circle cx="950" cy="620" r="15"/><circle cx="1060" cy="840" r="15"/>
    <circle cx="400" cy="900" r="15"/><circle cx="330" cy="980" r="13"/>
    <circle cx="900" cy="360" r="12" opacity="0.55"/><circle cx="1010" cy="400" r="12" opacity="0.55"/>
  </g>
  <g fill="#7ec868">
    <path d="M480 720 q40 -34 80 0 z"/><path d="M920 950 q40 -34 80 0 z"/>
    <path d="M1120 430 q40 -34 80 0 z"/>
  </g>

  <!-- wordmark -->
  <text x="1370" y="1360" text-anchor="end" font-size="92" font-weight="800" font-style="italic" fill="#ffffff" opacity="0.92">Paldea</text>
</svg>
