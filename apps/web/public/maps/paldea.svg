<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1400" font-family="system-ui, sans-serif">
  <!-- Original schematic rendition of the Paldea region for the nuzlocke
       tracker (hand-authored flat-color vector art, no traced assets).
       Geography simplified to the 16 zones the SV dataset tracks: the Great
       Crater dead center, provinces radiating around it. -->

  <!-- sea -->
  <rect width="1400" height="1400" fill="#5fc4c7"/>
  <path d="M120 240 q60 -40 120 0 t120 0" stroke="#8fdadc" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M1120 1220 q60 -40 120 0 t120 0" stroke="#8fdadc" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M170 1090 q45 -30 90 0" stroke="#8fdadc" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M1180 300 q45 -30 90 0" stroke="#8fdadc" stroke-width="9" fill="none" stroke-linecap="round"/>

  <!-- landmass: rough Paldea silhouette (roundish, with headlands and bays) -->
  <path fill="#8fd05f" stroke="#4fb7ba" stroke-width="14" d="
    M700 130
    C 810 118, 930 140, 1010 200
    C 1050 160, 1120 180, 1130 240
    C 1220 300, 1280 420, 1260 520
    C 1310 560, 1310 640, 1250 680
    C 1290 780, 1290 900, 1210 990
    C 1240 1040, 1210 1100, 1150 1100
    C 1090 1200, 970 1265, 850 1270
    C 820 1320, 740 1335, 690 1300
    C 570 1330, 460 1290, 390 1210
    C 320 1200, 270 1140, 280 1080
    C 190 1010, 150 900, 170 800
    C 120 750, 120 660, 180 620
    C 170 500, 230 380, 330 300
    C 330 240, 390 200, 440 220
    C 520 160, 610 138, 700 130 Z"/>

  <!-- inner meadow tone -->
  <path fill="#a9dd76" d="
    M700 210
    C 870 200, 1030 270, 1110 390
    C 1190 510, 1200 640, 1160 760
    C 1200 850, 1180 950, 1110 1010
    C 1050 1120, 930 1190, 800 1200
    C 690 1240, 560 1220, 470 1160
    C 360 1110, 300 1010, 280 910
    C 230 840, 230 720, 270 640
    C 260 520, 320 400, 420 330
    C 500 260, 600 220, 700 210 Z"/>

  <!-- beaches -->
  <path fill="#eede9d" d="M420 1230 C 500 1290, 640 1315, 750 1300 C 700 1330, 540 1300, 430 1230 Z"/>
  <path fill="#eede9d" d="M1180 340 C 1250 450, 1280 560, 1265 680 C 1290 590, 1275 460, 1180 340 Z"/>

  <!-- Casseroya Lake (NW) -->
  <path fill="#57b7e8" stroke="#3d9ecf" stroke-width="8" d="
    M330 380 C 380 330, 470 330, 520 380 C 560 420, 560 480, 520 520
    C 480 560, 400 570, 350 530 C 300 490, 295 420, 330 380 Z"/>
  <circle cx="430" cy="450" r="24" fill="#a9dd76"/>

  <!-- Glaseado Mountain (N): snow cap cluster -->
  <g>
    <path fill="#e9eef6" stroke="#c9d4e4" stroke-width="6" d="M600 470 L700 300 L800 470 Z"/>
    <path fill="#dfe7f2" d="M540 490 L610 380 L680 490 Z"/>
    <path fill="#dfe7f2" d="M720 490 L790 380 L860 490 Z"/>
    <path fill="#ffffff" d="M665 360 L700 300 L735 360 L700 345 Z"/>
  </g>

  <!-- North Province ridge tint -->
  <path fill="#96cf82" d="M820 260 C 950 250, 1080 320, 1130 420 C 1060 400, 940 380, 880 420 C 860 360, 840 300, 820 260 Z"/>

  <!-- Tagtree Thicket (ENE): dense dark forest -->
  <g fill="#4f9e4f">
    <circle cx="1030" cy="520" r="34"/><circle cx="1075" cy="495" r="30"/>
    <circle cx="1110" cy="530" r="32"/><circle cx="1060" cy="555" r="30"/>
  </g>

  <!-- Asado Desert (W): dunes -->
  <path fill="#ecd489" stroke="#d9bd6d" stroke-width="6" d="
    M290 655 C 340 610, 445 605, 500 650 C 545 688, 540 748, 495 780
    C 445 818, 345 820, 305 780 C 268 742, 262 692, 290 655 Z"/>
  <g stroke="#d9bd6d" stroke-width="7" fill="none" stroke-linecap="round">
    <path d="M320 690 q22 -14 44 0"/>
    <path d="M420 670 q22 -14 44 0"/>
    <path d="M360 735 q22 -14 44 0"/>
    <path d="M440 755 q22 -14 44 0"/>
  </g>

  <!-- rivers from crater -->
  <path d="M700 850 C 690 950, 660 1030, 620 1090" stroke="#57b7e8" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M840 760 C 940 780, 1020 770, 1090 740" stroke="#57b7e8" stroke-width="12" fill="none" stroke-linecap="round"/>

  <!-- Great Crater of Paldea (center): rocky rim + depths -->
  <circle cx="700" cy="700" r="165" fill="#c9a76b" stroke="#a9884e" stroke-width="10"/>
  <circle cx="700" cy="700" r="118" fill="#6b5a86"/>
  <circle cx="700" cy="700" r="70" fill="#4a3a5e"/>
  <circle cx="700" cy="700" r="26" fill="#8f7bb5"/>
  <g stroke="#a9884e" stroke-width="8" stroke-linecap="round">
    <path d="M700 528 l0 -26 M700 872 l0 26 M528 700 l-26 0 M872 700 l26 0"/>
    <path d="M580 580 l-18 -18 M820 580 l18 -18 M580 820 l-18 18 M820 820 l18 18"/>
  </g>

  <!-- Mesagoza (S center): big city ring + academy dome -->
  <g>
    <path d="M590 1075 h220 a14 14 0 0 1 14 14 v58 a14 14 0 0 1 -14 14 h-220 a14 14 0 0 1 -14 -14 v-58 a14 14 0 0 1 14 -14 Z" fill="#c8c2ba" stroke="#a89f93" stroke-width="5"/>
    <rect x="612" y="1042" width="34" height="40" rx="6" fill="#b3ab9f"/>
    <rect x="668" y="1030" width="42" height="52" rx="6" fill="#beb6a9"/>
    <rect x="742" y="1046" width="34" height="36" rx="6" fill="#b3ab9f"/>
    <circle cx="700" cy="1042" r="26" fill="#e8b13f" stroke="#c98f2a" stroke-width="5"/>
    <circle cx="700" cy="1042" r="10" fill="#f6d788"/>
    <path d="M600 1118 h200" stroke="#a89f93" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Levincia (E coast): city blocks -->
  <g>
    <rect x="1130" y="660" width="90" height="58" rx="9" fill="#c8c2ba" stroke="#a89f93" stroke-width="5"/>
    <rect x="1150" y="632" width="26" height="34" rx="5" fill="#8fd0e8"/>
    <rect x="1186" y="622" width="22" height="44" rx="5" fill="#b3ab9f"/>
  </g>

  <!-- Porto Marinada (W coast): small harbor -->
  <g>
    <rect x="230" y="560" width="66" height="40" rx="8" fill="#d9a06b" stroke="#b9834f" stroke-width="4"/>
    <path d="M224 612 q30 18 80 6" stroke="#3d9ecf" stroke-width="6" fill="none"/>
  </g>

  <!-- scattered trees / hills for texture -->
  <g fill="#6fbf5a">
    <circle cx="540" cy="960" r="18"/><circle cx="580" cy="985" r="14"/>
    <circle cx="930" cy="1030" r="18"/><circle cx="965" cy="1005" r="14"/>
    <circle cx="900" cy="480" r="15"/><circle cx="1010" cy="800" r="15"/>
    <circle cx="420" cy="880" r="15"/><circle cx="350" cy="960" r="13"/>
  </g>
  <g fill="#7ec868">
    <path d="M480 700 q40 -34 80 0 z"/><path d="M900 900 q40 -34 80 0 z"/>
    <path d="M1030 380 q40 -34 80 0 z"/>
  </g>

  <!-- wordmark -->
  <text x="1370" y="1360" text-anchor="end" font-size="92" font-weight="800" font-style="italic" fill="#ffffff" opacity="0.92">Paldea</text>
</svg>
