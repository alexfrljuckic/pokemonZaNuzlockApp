<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" font-family="system-ui, sans-serif">
  <!-- Original schematic rendition of Lumiose City (Legends: Z-A) — hand-
       authored flat-color vector art, no traced assets. DELIBERATELY
       schematic: the 20 wild zones are arranged by number on two rings
       (inner = zones 1-10, outer = 11-20, clockwise from south) rather than
       by their in-game street positions; numbered banners mirror the route
       banners on the other region maps. Hyperspace zones are non-geographic
       and intentionally absent (they list under "Other areas"). -->

  <!-- countryside around the city -->
  <rect width="1200" height="1200" fill="#8fc46a"/>
  <g fill="#7ab557">
    <circle cx="120" cy="140" r="40"/><circle cx="1080" cy="180" r="34"/>
    <circle cx="150" cy="1060" r="38"/><circle cx="1060" cy="1040" r="42"/>
    <circle cx="80" cy="620" r="30"/><circle cx="1130" cy="640" r="28"/>
  </g>

  <!-- city wall + plaza base -->
  <circle cx="600" cy="600" r="545" fill="#e8ddca" stroke="#b7a888" stroke-width="14"/>
  <circle cx="600" cy="600" r="545" fill="none" stroke="#d94f5c" stroke-width="4" stroke-dasharray="2 26" opacity="0.7"/>

  <!-- ring boulevards -->
  <circle cx="600" cy="600" r="345" fill="none" stroke="#c9b99a" stroke-width="26"/>
  <circle cx="600" cy="600" r="175" fill="none" stroke="#c9b99a" stroke-width="22"/>

  <!-- radial avenues -->
  <g stroke="#c9b99a" stroke-width="18">
    <path d="M600 90 V 1110"/>
    <path d="M90 600 H 1110"/>
    <path d="M240 240 L 960 960"/>
    <path d="M960 240 L 240 960"/>
  </g>

  <!-- building texture: sparse blocks between boulevards -->
  <g fill="#d3c5ab" stroke="#b7a888" stroke-width="3">
    <rect x="500" y="240" width="44" height="30" rx="5"/><rect x="660" y="260" width="36" height="26" rx="5"/>
    <rect x="880" y="470" width="40" height="28" rx="5"/><rect x="900" y="660" width="34" height="26" rx="5"/>
    <rect x="250" y="470" width="38" height="28" rx="5"/><rect x="270" y="680" width="34" height="24" rx="5"/>
    <rect x="480" y="920" width="42" height="28" rx="5"/><rect x="670" y="930" width="36" height="26" rx="5"/>
    <rect x="410" y="300" width="34" height="24" rx="5"/><rect x="760" y="320" width="34" height="24" rx="5"/>
    <rect x="330" y="860" width="34" height="24" rx="5"/><rect x="800" y="850" width="36" height="24" rx="5"/>
  </g>
  <g fill="#c46a6a">
    <rect x="508" y="234" width="12" height="8" rx="2"/><rect x="886" y="464" width="12" height="8" rx="2"/>
    <rect x="256" y="464" width="12" height="8" rx="2"/><rect x="676" y="924" width="12" height="8" rx="2"/>
  </g>

  <!-- Prism Tower + Centrico Plaza -->
  <circle cx="600" cy="600" r="86" fill="#dfd2b8" stroke="#b7a888" stroke-width="6"/>
  <g>
    <path d="M600 500 L640 610 L560 610 Z" fill="#3a3440" stroke="#26212e" stroke-width="5"/>
    <path d="M578 610 h44 v34 a8 8 0 0 1 -8 8 h-28 a8 8 0 0 1 -8 -8 Z" fill="#4a4356"/>
    <circle cx="600" cy="560" r="12" fill="#f2b04e"/>
  </g>

  <!-- wild zone parks: inner ring 1-10, outer ring 11-20 (clockwise from S) -->
  <g fill="#8fce62" stroke="#6fb54a" stroke-width="5">
    <ellipse cx="600" cy="860" rx="52" ry="38"/>
    <ellipse cx="447" cy="810" rx="52" ry="38"/>
    <ellipse cx="353" cy="680" rx="52" ry="38"/>
    <ellipse cx="353" cy="520" rx="52" ry="38"/>
    <ellipse cx="447" cy="390" rx="52" ry="38"/>
    <ellipse cx="600" cy="340" rx="52" ry="38"/>
    <ellipse cx="753" cy="390" rx="52" ry="38"/>
    <ellipse cx="847" cy="520" rx="52" ry="38"/>
    <ellipse cx="847" cy="680" rx="52" ry="38"/>
    <ellipse cx="753" cy="810" rx="52" ry="38"/>
    <ellipse cx="467" cy="1009" rx="54" ry="40"/>
    <ellipse cx="252" cy="853" rx="54" ry="40"/>
    <ellipse cx="170" cy="600" rx="54" ry="40"/>
    <ellipse cx="252" cy="347" rx="54" ry="40"/>
    <ellipse cx="467" cy="191" rx="54" ry="40"/>
    <ellipse cx="733" cy="191" rx="54" ry="40"/>
    <ellipse cx="948" cy="347" rx="54" ry="40"/>
    <ellipse cx="1030" cy="600" rx="54" ry="40"/>
    <ellipse cx="948" cy="853" rx="54" ry="40"/>
    <ellipse cx="733" cy="1009" rx="54" ry="40"/>
  </g>
  <!-- park trees -->
  <g fill="#6fb54a">
    <circle cx="580" cy="852" r="10"/><circle cx="620" cy="868" r="8"/>
    <circle cx="430" cy="802" r="10"/><circle cx="336" cy="672" r="10"/>
    <circle cx="370" cy="528" r="10"/><circle cx="464" cy="382" r="10"/>
    <circle cx="583" cy="332" r="10"/><circle cx="770" cy="398" r="10"/>
    <circle cx="864" cy="528" r="10"/><circle cx="830" cy="672" r="10"/>
    <circle cx="736" cy="818" r="10"/><circle cx="450" cy="1001" r="10"/>
    <circle cx="235" cy="845" r="10"/><circle cx="153" cy="592" r="10"/>
    <circle cx="269" cy="355" r="10"/><circle cx="484" cy="199" r="10"/>
    <circle cx="716" cy="183" r="10"/><circle cx="931" cy="339" r="10"/>
    <circle cx="1013" cy="608" r="10"/><circle cx="965" cy="861" r="10"/>
    <circle cx="750" cy="1017" r="10"/>
  </g>

  <!-- zone number banners (Z red, matching the app's plza accent) -->
  <g font-size="26" font-weight="800" text-anchor="middle" fill="#ffffff">
    <g>
      <circle cx="600" cy="860" r="20" fill="#e0435a"/><text x="600" y="869">1</text>
      <circle cx="447" cy="810" r="20" fill="#e0435a"/><text x="447" y="819">2</text>
      <circle cx="353" cy="680" r="20" fill="#e0435a"/><text x="353" y="689">3</text>
      <circle cx="353" cy="520" r="20" fill="#e0435a"/><text x="353" y="529">4</text>
      <circle cx="447" cy="390" r="20" fill="#e0435a"/><text x="447" y="399">5</text>
      <circle cx="600" cy="340" r="20" fill="#e0435a"/><text x="600" y="349">6</text>
      <circle cx="753" cy="390" r="20" fill="#e0435a"/><text x="753" y="399">7</text>
      <circle cx="847" cy="520" r="20" fill="#e0435a"/><text x="847" y="529">8</text>
      <circle cx="847" cy="680" r="20" fill="#e0435a"/><text x="847" y="689">9</text>
      <circle cx="753" cy="810" r="20" fill="#e0435a"/><text x="753" y="819">10</text>
      <circle cx="467" cy="1009" r="20" fill="#e0435a"/><text x="467" y="1018">11</text>
      <circle cx="252" cy="853" r="20" fill="#e0435a"/><text x="252" y="862">12</text>
      <circle cx="170" cy="600" r="20" fill="#e0435a"/><text x="170" y="609">13</text>
      <circle cx="252" cy="347" r="20" fill="#e0435a"/><text x="252" y="356">14</text>
      <circle cx="467" cy="191" r="20" fill="#e0435a"/><text x="467" y="200">15</text>
      <circle cx="733" cy="191" r="20" fill="#e0435a"/><text x="733" y="200">16</text>
      <circle cx="948" cy="347" r="20" fill="#e0435a"/><text x="948" y="356">17</text>
      <circle cx="1030" cy="600" r="20" fill="#e0435a"/><text x="1030" y="609">18</text>
      <circle cx="948" cy="853" r="20" fill="#e0435a"/><text x="948" y="862">19</text>
      <circle cx="733" cy="1009" r="20" fill="#e0435a"/><text x="733" y="1018">20</text>
    </g>
  </g>

  <!-- wordmark -->
  <text x="1178" y="1170" text-anchor="end" font-size="72" font-weight="800" font-style="italic" fill="#ffffff" opacity="0.95">Lumiose</text>
</svg>
