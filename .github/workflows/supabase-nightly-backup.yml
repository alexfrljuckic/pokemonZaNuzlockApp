name: Supabase nightly backup
# BACKLOG item 9 / docs/COSTS.md "Standing safeguards": makes Level 3 of the
# cost kill switch (downgrade or delete the Supabase project) painless —
# data is never only in one place. Requires repo secret SUPABASE_DB_URL,
# the full Postgres connection string (contains the DB password — this one
# is genuinely sensitive, unlike the anon key). See supabase/README.md for
# where to find it. Artifacts are retained 30 days on GitHub's side; anyone
# wanting longer retention should periodically download and archive them
# elsewhere (this workflow intentionally doesn't add a second paid/metered
# storage dependency for that).
on:
  schedule:
    - cron: '0 9 * * *' # nightly, 09:00 UTC
  workflow_dispatch: {} # allows a manual "Run workflow" click to test on demand
jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install postgresql-client
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client
      - name: Dump database
        run: |
          pg_dump "${SUPABASE_DB_URL}" \
            --no-owner --no-privileges \
            -f "backup-$(date -u +%Y-%m-%dT%H%M%SZ).sql"
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_id }}
          path: backup-*.sql
          retention-days: 30
