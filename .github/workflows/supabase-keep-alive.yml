name: Supabase keep-alive
# BACKLOG item 9 / docs/COSTS.md "Standing safeguards": Supabase free-tier
# projects pause after 7 days with no activity. A weekly ping is well under
# that window with margin to spare. Requires repo secrets SUPABASE_URL and
# SUPABASE_ANON_KEY — see supabase/README.md for where to find them. Both
# are safe to store as plain secrets (the anon key is designed to be public
# client-side; it's just kept as a secret here for tidiness/portability).
on:
  schedule:
    - cron: '0 12 * * 1' # every Monday, 12:00 UTC
  workflow_dispatch: {} # allows a manual "Run workflow" click to test on demand
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST endpoint
        run: |
          curl -sf "${SUPABASE_URL}/rest/v1/" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -o /dev/null -w "keep-alive ping: HTTP %{http_code}\n"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
